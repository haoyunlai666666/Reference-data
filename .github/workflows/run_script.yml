name: Daily Python Script Execution

on:
  push:
    branches: [ "main" ] # 每次提交代码时触发
  workflow_dispatch: # 允许你在网页上点击按钮手动触发测试
  schedule:
    # 每天固定的标准时间 (UTC) 00:00 运行（对应北京时间早上 08:00）
    - cron: '0 0 * * *'

jobs:
  run-and-mail:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码（升级为最新 v4 版，完美消除旧版本 Node 警告）
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境（升级为最新 v5 版，完美消除旧版本 Node 警告）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # 开启缓存，提升每日运行速度

    # 3. 安装依赖（保留你原本的 Playwright，并新增用于破防的 curl_cffi，完美融合：既安装你原本要求的全部库，又补上防封的 curl_cffi）
    - name: Install Dependencies and Playwright Chromium
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install curl_cffi requests
        python -m playwright install chromium --with-deps

    # 4. 执行所有的 Python 脚本（新旧脚本依次流水线执行）
    - name: Run Python script
      run: |
        python duibi.py
        python zhuaqu.py
        python daochuusp.py # 【全新融入】：在最后一步安全拉取 13MB USP 对照品大表

    # 5. 发送带 3 个 Excel 附件的邮件到指定的邮箱
    - name: Send Email with Excel Attachment
      # 【核心保护】：发送大附件极易因新浪服务器不回执导致假死转圈，这里限制最长 5 分钟，超时也会安全断开退出
      timeout-minutes: 5 
      uses: dawidd6/action-send-mail@v4 # 升级为 v4 版，消除旧 Node 警告
      with:
        server_address: smtp.sina.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【自动任务】每日 对照品Excel 数据报表"
        to: "liuliming@kvvit.com,jxlbpl@kvvit.com,luoxiuzhen@kvvit.com"
        from: GitHub Actions Robot
        secure: true
        body: "您好，这是由 GitHub Actions 自动运行 Python 脚本生成的每日对照品 Excel 报表，请查收附件。"
        
        # 🔗 【完美融合】：将你原本的 2 个附件和新下载的 usprefstd.xls 合并在一起发送
        attachments: |
          国家药品标准物质目录_全量在售.xlsx
          EDQM_Catalog_Output.xlsx
          usprefstd.xls
