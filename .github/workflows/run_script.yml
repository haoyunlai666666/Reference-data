name: Daily Python Script Execution

on:
  push:
    branches: [ "main" ] # 每次提交代码时触发
  workflow_dispatch: # 允许你在网页上点击按钮手动触发测试
  schedule:
    # 每天固定的标准时间 (UTC) 00:00 运行（对应北京时间早上 08:00）
    - cron: '16 22 * * *'

jobs:
  run-and-mail:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码（完美同步拿到你后续上传的 现有全部对照品目录.xlsx）
    - name: Checkout repository code
      uses: actions/checkout@v5

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip' # 开启缓存，提升每日运行速度

   # 3. 安装依赖（融合你原本的爬虫库，并增加 pandas 及其 Excel 依赖库）
    - name: Install Dependencies and Playwright Chromium
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install curl_cffi requests pandas openpyxl xlrd lxml html5lib
        python -m playwright install chromium --with-deps

    # 4. 执行所有数据生成脚本，并在最后运行对账和比对脚本
    - name: 运行对账和比对脚本
      run: python duibi.py
      continue-on-error: true # 👈 即使报错，后面的脚本也会继续运行

    - name: 运行抓取脚本
      run: python zhuaqu.py
      continue-on-error: true # 👈 即使报错，后面的脚本也会继续运行

    - name: 运行真实目录数据流抓取脚本
      run: python daochuusp.py
      continue-on-error: true # 👈 即使报错，后面的脚本也会继续运行

    - name: 运行全新双列多库交叉比对脚本
      run: python check_data.py # 【全新引入】：读取本地文件与上述三个生成的文件做双列多库交叉比对
      # 作为核心检测的最后一步，无需加 continue-on-error


    # 5. 发送带 3 个 Excel 附件的动态对账邮件到指定的邮箱
    - name: Send Email with Excel Attachment
      uses: dawidd6/action-send-mail@v17
      with:
        server_address: smtp.sina.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【自动报表】今日药品对照品数据监控及对账单"
        to: "liuliming@kvvit.com,jxlgp1@kvvit.com,luoxiuzhen@kvvit.com"
        from: ${{ secrets.EMAIL_USERNAME }}
        # 【关键整改】：不再使用死板的 body，改为动态拉取 check_data.py 生成的带黄色高亮的 HTML 正文
        html_body: file://mail_body.html
        attachments: "国家药品标准物质目录_全量在售.xlsx,EDQM_Catalog_Output.xlsx,usprefstd.xls"
