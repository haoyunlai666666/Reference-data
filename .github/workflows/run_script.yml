name: Daily Python Script Execution

on:
  push:
    branches: [ "main" ] # 每次提交代码时触发
  workflow_dispatch: # 允许你在网页上点击按钮手动触发测试
  schedule:
    # 每天固定的标准时间 (UTC) 00:00 运行（对应北京时间早上 08:00）
    - cron: '0 0 * * *'

jobs:
  run-and-mail:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码（完美同步拿到你后续上传的 现有全部对照品目录.xlsx）
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # 开启缓存，提升每日运行速度

   # 3. 安装依赖（融合你原本的爬虫库，并增加 pandas 及其 Excel 依赖库）
    - name: Install Dependencies and Playwright Chromium
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install curl_cffi requests pandas openpyxl xlrd lxml html5lib
        python -m playwright install chromium --with-deps

   # 4. 执行所有数据生成脚本，并在最后运行对账和比对脚本
    # 4.1 抓取 EDQM 数据（独立封装，允许其失败不阻塞后续）
    - name: Run EDQM Fetch Script
      id: edqm_step
      continue-on-error: true  # 核心关键 1：即使它报错，也允许工作流继续往下走
      run: python zhuaqu.py

    # 4.2 导出 USP 数据（独立执行，完全不吃上一步的排泄）
    - name: Run USP Fetch Script
      id: usp_step
      continue-on-error: true  # 核心关键 2：两强并立，谁崩都不耽误大局
      run: python daochuusp.py

    # 4.3 强行触发最终的对账与比对汇总报告
    - name: Exec Cross Check and Mail Generate
      if: always()             # 核心关键 3：不管上面两个爬虫谁成谁败，最终对账脚本必须强制执行！
      run: python check_data.py
 # 【全新引入】：读取本地文件与上述三个生成的文件做双列多库交叉比对

    # 5. 发送带 3 个 Excel 附件的动态对账邮件到指定的邮箱
    - name: Send Email with Excel Attachment
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.sina.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【自动报表】今日药品对照品数据监控及对账单"
        to: liuliming@kvvit.com
        from: ${{ secrets.EMAIL_USERNAME }}
        # 【关键整改】：不再使用死板的 body，改为动态拉取 check_data.py 生成的带黄色高亮的 HTML 正文
        html_body: file://mail_body.html
        attachments: "国家药品标准物质目录_全量在售.xlsx,EDQM_Catalog_Output.xlsx,usprefstd.xls"
