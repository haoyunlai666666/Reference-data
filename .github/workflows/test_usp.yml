name: Test USP Catalog Downloader Only

on:
  workflow_dispatch: # 保持手动点击触发

jobs:
  test-single-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install requests

    - name: Run USP Downloader
      run: python daochuusp.py

    - name: Send Email with USP Attachment
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.sina.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【独立测试】USP 官方对照品完整清单"
        to: "liuliming@kvvit.com"
        from: GitHub Actions Robot
        secure: true
        body: "您好，这是单独测试导出的 USP 官方对照品完整清单，采用无损二进制通道抓取，已精确匹配原厂 .xls 格式，请查收附件。"
        
        # 🔗 【核心修改】：附件名称同步修改为原装的 .xls 后缀
        attachments: Reference Standards Catalog.xls
