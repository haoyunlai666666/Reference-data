name: Test USP Catalog Downloader Only

on:
  workflow_dispatch: # 保持手动点击触发

jobs:
  test-single-run:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # 3. 安装专属防封依赖库（curl_cffi 的下载安装极快）
    - name: Install Anti-Bot Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install curl_cffi

    # 4. 执行你的直链无损下载脚本
    - name: Run USP Downloader
      run: python daochuusp.py

    # 5. 发送包含该新 Excel 附件的邮件到指定的邮箱
    - name: Send Email with USP Attachment
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.sina.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【独立测试】USP 官方对照品完整清单"
        to: "liuliming@kvvit.com"
        from: GitHub Actions Robot
        secure: true
        body: "您好，这是单独测试导出的 USP 官方对照品完整清单（Reference Standards Catalog），采用 Chrome 真实 TLS 指纹无损通道抓取，请查收附件。"
        attachments: Reference Standards Catalog.xls
