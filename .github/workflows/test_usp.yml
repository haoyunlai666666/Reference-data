name: Test USP Catalog Downloader Only

on:
  workflow_dispatch: # 保持手动点击触发不变

jobs:
  test-single-run:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # 3. 安装依赖（加入你的旧配置文件第35-36行的核心系统级浏览器驱动）
    - name: Install Playwright and Browser Deps
      run: |
        pip install playwright
        python -m playwright install chromium --with-deps

    # 4. 单独执行你的新 USP 脚本
    - name: Run USP Downloader
      run: python daochuusp.py

    # 5. 单独发送带有这个新 Excel 的邮件
    - name: Send Email with USP Attachment
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ://sina.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【独立测试】USP 官方对照品完整清单"
        to: "liuliming@kvvit.com"
        from: GitHub Actions Robot
        secure: true
        body: "您好，这是通过真实浏览器环境导出的 USP 官方对照品完整清单，请查看附件中的 Excel 文件。"
        attachments: Reference Standards Catalog.xlsx
