name: Daily Sync From Render Web

on:
  schedule:
    - cron: '16 17 * * *' # 每天北京时间凌晨 01:16 自动运行
  workflow_dispatch: # 保持手动点击运行功能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download Excel from Render
      run: |
        # 尝试下载文件，并将网络的响应状态码记录下来
        STATUS_CODE=$(curl -s -o "现有全部对照品目录.xlsx" -w "%{http_code}" -L "https://duizhaopin-excel.onrender.com")
        
        # 如果返回的不是 200 (成功)，说明 Render 此时没文件或报错了，立刻安全熔断
        if [ "$STATUS_CODE" -ne 200 ]; then
          echo "=================================================================="
          echo "❌ 错误提示：网站中没有上传现有对照品目录excel文件，或网站正在唤醒！"
          echo "=================================================================="
          
          # 立即把可能产生的破损 HTML 临时文件删掉，死死保护你第一步手动传上去的真文件！
          git checkout -- "现有全部对照品目录.xlsx"
          exit 1
        fi

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if git diff --quiet "现有全部对照品目录.xlsx"; then
          echo "No changes found. Skip upload."
        else
          git add "现有全部对照品目录.xlsx"
          git commit -m "Auto updated: 现有全部对照品目录"
          git push
        fi
