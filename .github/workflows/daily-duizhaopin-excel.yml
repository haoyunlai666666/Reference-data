name: Daily Sync From Render Web

on:
  schedule:
    - cron: '16 17 * * *' # 每天北京时间凌晨 01:16 自动运行
  workflow_dispatch: # 保持手动点击运行功能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download Excel from Render
      run: |
        # 尝试下载文件，并将网络的响应状态码记录下来
        STATUS_CODE=$(curl -s -o "现有全部对照品目录.xlsx" -w "%{http_code}" -L "https://duizhaopin-excel.onrender.com")
        
        # 判断状态码是否为 200（代表下载成功）
        if [ "$STATUS_CODE" -ne 200 ]; then
          echo "=================================================================="
          echo "❌ 错误提示：网站中没有上传现有对照品目录excel文件！"
          echo "=================================================================="
          
          # 清理可能产生的残缺假文件，确保不污染仓库
          rm -f "现有全部对照品目录.xlsx"
          
          # 强行让脚本以失败状态退出，触发 GitHub 的红叉报警
          exit 1
        fi

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        if git diff --quiet "现有全部对照品目录.xlsx"; then
          echo "No changes found. Skip upload."
        else
          git add "现有全部对照品目录.xlsx"
          git commit -m "Auto updated: 现有全部对照品目录"
          git push
        fi
